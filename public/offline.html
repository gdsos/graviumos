<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050506" />
    <title>Offline - Gravium OS</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050506;
        --panel: rgba(18, 18, 18, 0.78);
        --panel-soft: rgba(245, 245, 245, 0.045);
        --line: rgba(245, 245, 245, 0.12);
        --line-strong: rgba(245, 245, 245, 0.18);
        --text: #f5f5f5;
        --muted: rgba(245, 245, 245, 0.64);
        --quiet: rgba(245, 245, 245, 0.42);
        --wood: #603d2a;
        --olive: #555d3a;
        --amber: #ffd479;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 24% 18%, rgba(96, 61, 42, 0.22), transparent 28rem),
          radial-gradient(circle at 84% 82%, rgba(85, 93, 58, 0.18), transparent 30rem),
          linear-gradient(135deg, #050506 0%, #0b0b0b 48%, #050506 100%);
        color: var(--text);
        font-family:
          "Neue Montreal",
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(245, 245, 245, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(245, 245, 245, 0.035) 1px, transparent 1px);
        background-size: 46px 46px;
        mask-image: radial-gradient(circle at center, black, transparent 74%);
      }

      .page {
        position: relative;
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 18px;
      }

      .card {
        width: min(520px, 100%);
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 30px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.024)),
          var(--panel);
        box-shadow:
          0 26px 90px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(24px);
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid var(--line);
        padding: 18px 20px;
      }

      .brand img {
        display: block;
        width: 116px;
        height: auto;
        object-fit: contain;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        border: 1px solid rgba(255, 212, 121, 0.22);
        border-radius: 999px;
        background: rgba(255, 212, 121, 0.08);
        padding: 7px 11px;
        color: rgba(255, 226, 167, 0.94);
        font-size: 11px;
        font-weight: 700;
        white-space: nowrap;
      }

      .dot {
        position: relative;
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--amber);
      }

      .dot::after {
        content: "";
        position: absolute;
        inset: -6px;
        border: 1px solid rgba(255, 212, 121, 0.42);
        border-radius: inherit;
        animation: pulse 1.7s infinite;
      }

      .body {
        padding: clamp(28px, 5vw, 42px);
      }

      .eyebrow {
        color: var(--quiet);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 12px 0 0;
        font-size: clamp(32px, 6vw, 46px);
        line-height: 1.02;
        letter-spacing: -0.045em;
      }

      p {
        margin: 16px 0 0;
        max-width: 390px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.65;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 26px;
      }

      button {
        font: inherit;
      }

      .btn {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        border: 1px solid rgba(245, 245, 245, 0.14);
        background: rgba(245, 245, 245, 0.06);
        padding: 0 18px;
        color: var(--text);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.18s ease,
          background 0.18s ease,
          border-color 0.18s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        border-color: rgba(245, 245, 245, 0.24);
        background: rgba(245, 245, 245, 0.1);
      }

      .meta {
        margin-top: 26px;
        border-top: 1px solid var(--line);
        padding-top: 14px;
        color: var(--quiet);
        font-size: 12px;
        line-height: 1.6;
      }

      .meta strong {
        color: rgba(245, 245, 245, 0.82);
        font-weight: 600;
      }

      @keyframes pulse {
        0% {
          opacity: 1;
          transform: scale(0.7);
        }

        100% {
          opacity: 0;
          transform: scale(1.65);
        }
      }

      @media (max-width: 560px) {
        .page {
          padding: 12px;
        }

        .card {
          border-radius: 26px;
        }

        .top {
          padding: 16px;
        }

        .brand img {
          width: 108px;
        }

        .body {
          padding: 28px 22px 24px;
        }

        h1 {
          font-size: 34px;
        }

        p {
          font-size: 14px;
        }

        .actions {
          display: grid;
          grid-template-columns: 1fr;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <main class="page">
      <section class="card" aria-labelledby="offline-title">
        <header class="top">
          <div class="brand">
            <img src="/brand/gravium-wordmark-dark.png" alt="Gravium OS" />
          </div>

          <div class="status" id="status-pill">
            <span class="dot" aria-hidden="true"></span>
            Offline
          </div>
        </header>

        <div class="body">
          <div class="eyebrow">Network unavailable</div>
          <h1 id="offline-title">Connection paused.</h1>
          <p>
            Gravium OS is waiting for the network to return. This page will check automatically.
          </p>

          <div class="actions">
            <button class="btn" type="button" id="check-button">
              Check Connection
            </button>
          </div>

          <div class="meta">
            Status: <strong id="status-text">Checking every 5 seconds</strong><br />
            Last checked: <strong id="last-checked">just now</strong>
          </div>
        </div>
      </section>
    </main>

    <script>
      const checkedEl = document.getElementById("last-checked");
      const statusTextEl = document.getElementById("status-text");
      const statusPill = document.getElementById("status-pill");
      const checkButton = document.getElementById("check-button");

      const params = new URLSearchParams(window.location.search);
      const returnPath = params.get("from") || "/";

      function updateCheckedTime() {
        checkedEl.textContent = new Date().toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      async function checkConnection() {
        updateCheckedTime();
        statusTextEl.textContent = "Checking connection...";

        try {
          const response = await fetch("/", {
            method: "HEAD",
            cache: "no-store",
          });

          if (!response.ok) {
            throw new Error("Network not ready");
          }

          statusPill.innerHTML = "Connection restored";
          statusTextEl.textContent = "Connection restored. Returning to Gravium OS...";

          window.setTimeout(() => {
            window.location.replace(returnPath);
          }, 650);
        } catch (error) {
          statusTextEl.textContent = "Still offline. Checking again shortly.";
        }
      }

      checkButton.addEventListener("click", checkConnection);

      window.addEventListener("online", checkConnection);
      window.addEventListener("offline", () => {
        updateCheckedTime();
        statusPill.innerHTML = '<span class="dot" aria-hidden="true"></span>Offline';
        statusTextEl.textContent = "Still offline. Checking every 5 seconds.";
      });

      window.setInterval(checkConnection, 5000);
      updateCheckedTime();
      checkConnection();
    </script>
  </body>
</html>
