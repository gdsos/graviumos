<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gravium OS</title>
    <meta name="description" content="Internal operating system for Gravium Design Studio." />
    <meta name="application-name" content="Gravium OS" />
    <meta name="apple-mobile-web-app-title" content="Gravium OS" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- PWA CORE -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark light" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon-v2.png" />
    <link rel="shortcut icon" href="/favicon-v2.png" />

    <!-- Social -->
    <meta name="twitter:card" content="summary_large_image">
  </head>

  <body>
    <div id="app-loader" style="position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; background: #000000; color: #F5F5F5; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
      <div style="position: absolute; inset: 0; background: radial-gradient(circle at 50% 38%, rgba(96,61,42,0.34), transparent 34%), linear-gradient(135deg, rgba(85,93,58,0.20), transparent 34%), linear-gradient(180deg, rgba(245,245,245,0.08), transparent 28%);"></div>
      <div style="position: relative; z-index: 1; display: flex; width: 100%; max-width: 24rem; flex-direction: column; align-items: center; padding: 0 2rem; text-align: center;">
        <div style="position: relative; margin-bottom: 1.75rem; display: flex; height: 6rem; width: 6rem; align-items: center; justify-content: center; border-radius: 2rem; border: 1px solid rgba(245,245,245,0.12); background: rgba(245,245,245,0.06); box-shadow: 0 25px 50px rgba(0,0,0,0.40);">
          <img src="/brand/gravium-icon-light.png" alt="" style="height: 3rem; width: 3rem; object-fit: contain; filter: brightness(0) invert(1);" />
        </div>
        <img src="/brand/gravium-wordmark-light.png" alt="Gravium" style="margin-bottom: 1rem; height: 1.75rem; width: auto; object-fit: contain; filter: brightness(0) invert(1);" />
        <p style="margin: 0; font-size: 0.875rem; font-weight: 500; letter-spacing: 0.22em; color: rgba(245,245,245,0.72); text-transform: uppercase;">Loading Gravium OS</p>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
