<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gravium OS</title>
    <meta name="description" content="Internal operating system for Gravium Design Studio." />

    <!-- PWA CORE -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon-v2.png" />
    <link rel="shortcut icon" href="/favicon-v2.png" />

    <!-- Social -->
    <meta name="twitter:card" content="summary_large_image">
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- PWA SERVICE WORKER (from PWA Build Studio) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
